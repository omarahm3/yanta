<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>YANTA</title>
  <script>
    // Early diagnostic - runs before any modules load
    const DEBUG_BUFFER_LIMIT = 100;
    function boundedPush(list, item) {
      list.push(item);
      if (list.length > DEBUG_BUFFER_LIMIT) {
        list.splice(0, list.length - DEBUG_BUFFER_LIMIT);
      }
    }

    window.__YANTA_DEBUG__ = {
      htmlLoaded: Date.now(),
      errors: [],
      logs: []
    };

    document.addEventListener('DOMContentLoaded', function () {
      window.__YANTA_DEBUG__.domReady = Date.now();
    });

    // Capture all errors
    function isHarmlessLoadError(message, filename) {
      if (!message) return false;
      // Benign browser notification — same-frame layout readjustment.
      if (message.indexOf('ResizeObserver loop completed with undelivered notifications') !== -1) return true;
      if (message.indexOf('ResizeObserver loop limit exceeded') !== -1) return true;
      // Wails serves /wails/custom.js from its runtime; when no custom.js is
      // registered some builds return HTML, producing a one-shot SyntaxError.
      if (filename && filename.indexOf('/wails/custom.js') !== -1 && message.indexOf('Unexpected token') !== -1) return true;
      return false;
    }

    window.addEventListener('error', function (event) {
      if (isHarmlessLoadError(event.message, event.filename)) {
        // Keep in the in-memory ring for debugging but do not console.error
        // (which would forward to backend once logging is initialized).
        event.stopImmediatePropagation();
        return;
      }
      boundedPush(window.__YANTA_DEBUG__.errors, {
        message: event.message,
        filename: event.filename,
        lineno: event.lineno,
        colno: event.colno,
        error: event.error ? event.error.toString() : null,
        time: Date.now()
      });
      console.error('[HTML] Error captured:', event.message, event.filename, event.lineno);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script src="./src/main.tsx" type="module"></script>
</body>

</html>
