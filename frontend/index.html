<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>YANTA</title>
  <script>
    // Early diagnostic - runs before any modules load
    const DEBUG_BUFFER_LIMIT = 100;
    function boundedPush(list, item) {
      list.push(item);
      if (list.length > DEBUG_BUFFER_LIMIT) {
        list.splice(0, list.length - DEBUG_BUFFER_LIMIT);
      }
    }

    window.__YANTA_DEBUG__ = {
      htmlLoaded: Date.now(),
      errors: [],
      logs: []
    };

    document.addEventListener('DOMContentLoaded', function () {
      window.__YANTA_DEBUG__.domReady = Date.now();
    });

    // Capture all errors
    window.addEventListener('error', function (event) {
      boundedPush(window.__YANTA_DEBUG__.errors, {
        message: event.message,
        filename: event.filename,
        lineno: event.lineno,
        colno: event.colno,
        error: event.error ? event.error.toString() : null,
        time: Date.now()
      });
      console.error('[HTML] Error captured:', event.message, event.filename, event.lineno);
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script src="./src/main.tsx" type="module"></script>
</body>

</html>
