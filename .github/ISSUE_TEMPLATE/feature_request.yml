name: Feature request
description: Propose a new capability or improvement.
labels: ["enhancement", "needs-goal"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Every issue is tied to a product goal (G1–G5).
        Pick the closest goal below — triage will swap `needs-goal` for the
        matching `goal:*` label, or flag the issue for the CEO if it is unclear.
  - type: dropdown
    id: goal
    attributes:
      label: Goal
      description: Which YANTA goal does this map to?
      options:
        - "G1 · Reliability & data-safety"
        - "G2 · Onboarding & usability"
        - "G3 · UI/UX polish"
        - "G4 · Distribution & release"
        - "G5 · Growth & maintenance"
        - "Not sure — let triage decide"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user need, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Optional — how you imagine it working.
    validations:
      required: false
