name: Build Release Artifacts

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string (e.g., 1.9.3 or 0.0.0-test.123)'
        required: true
        type: string
      artifact_suffix:
        description: 'Optional suffix for artifact names (for test builds)'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: linux
          os: ubuntu-24.04
        - name: windows
          os: windows-latest
        - name: macos
          os: macos-latest
    env:
      YANTA_VERSION: ${{ inputs.version }}
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Display build info
      run: |
        echo "Building version: ${{ inputs.version }}"
        echo "Commit: ${GITHUB_SHA::7}"

    - name: Install Linux dependencies
      if: matrix.name == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libgtk-4-dev \
          libwebkit2gtk-4.1-dev \
          libwebkitgtk-6.0-dev \
          build-essential \
          pkg-config \
          libayatana-appindicator3-dev \
          libx11-dev \
          xvfb

    - name: Install Windows dependencies
      if: matrix.name == 'windows'
      shell: powershell
      run: |
        choco install -y nsis
        $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
        if (Test-Path $nsisPath) {
          "$nsisPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$nsisPath\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        }

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 'stable'
        cache: true
        cache-dependency-path: go.sum

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json

    - name: Install Task CLI
      run: go install github.com/go-task/task/v3/cmd/task@latest

    - name: Install Wails v3
      run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

    - name: Build Linux artifacts
      if: matrix.name == 'linux'
      run: |
        task release:linux
        task release:ubuntu
        task release:list

    - name: Build Windows artifacts
      if: matrix.name == 'windows'
      run: |
        task release:windows
        task release:list

    - name: Build macOS artifacts
      if: matrix.name == 'macos'
      env:
        # Developer ID signing + notarization secrets. When unset (forks, PRs,
        # or before the CEO provisions them) the build falls back to an unsigned
        # .dmg — see docs/RELEASE-MACOS.md. A real release tag requires these.
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
        MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
      run: |
        task release:macos
        task release:list

    - name: Upload Linux tarball
      if: matrix.name == 'linux'
      uses: actions/upload-artifact@v6
      with:
        name: linux-tarball${{ inputs.artifact_suffix }}
        path: build/dist/yanta-linux.tar.gz
        if-no-files-found: error

    - name: Upload Arch Linux package
      if: matrix.name == 'linux'
      uses: actions/upload-artifact@v6
      with:
        name: linux-arch${{ inputs.artifact_suffix }}
        path: build/dist/yanta-*-x86_64.pkg.tar.zst
        if-no-files-found: error

    - name: Upload Debian package
      if: matrix.name == 'linux'
      uses: actions/upload-artifact@v6
      with:
        name: linux-deb${{ inputs.artifact_suffix }}
        path: build/dist/yanta_*_amd64.deb
        if-no-files-found: error

    - name: Upload Windows portable
      if: matrix.name == 'windows'
      uses: actions/upload-artifact@v6
      with:
        name: windows-portable${{ inputs.artifact_suffix }}
        path: build/dist/yanta-windows-portable.exe
        if-no-files-found: error

    - name: Upload Windows installer
      if: matrix.name == 'windows'
      uses: actions/upload-artifact@v6
      with:
        name: windows-installer${{ inputs.artifact_suffix }}
        path: build/dist/yanta-windows-installer.exe
        if-no-files-found: error

    # Built AFTER the portable/installer uploads so a problem here can never
    # strip the core Windows artifacts from the run. Reuses build/bin/yanta.exe
    # produced by `task release:windows` above (no rebuild, no second NSIS run).
    - name: Build Windows MSIX
      if: matrix.name == 'windows'
      shell: powershell
      env:
        # Partner Center identity. When unset (forks/PRs, or before reservation)
        # a placeholder identity is used and the .msix is local-test-only.
        # See docs/RELEASE-WINDOWS-MSIX.md.
        MSIX_IDENTITY_NAME: ${{ secrets.MSIX_IDENTITY_NAME }}
        MSIX_PUBLISHER: ${{ secrets.MSIX_PUBLISHER }}
        MSIX_PUBLISHER_DISPLAY: ${{ secrets.MSIX_PUBLISHER_DISPLAY }}
        # On a clean X.Y.Z release tag, a missing Windows SDK is a HARD failure
        # so we never publish a release without the MSIX. dev/prerelease/test
        # versions are skipped by the script before this gate is reached.
        MSIX_REQUIRE_FOR_RELEASE: '1'
      run: |
        task release:windows:msix
        task release:list

    - name: Upload Windows MSIX
      if: matrix.name == 'windows'
      uses: actions/upload-artifact@v6
      with:
        name: windows-msix${{ inputs.artifact_suffix }}
        path: build/dist/yanta-windows-*.msix
        # warn (not error): only prerelease/test versions intentionally produce
        # no MSIX. On a clean release tag the Build step above already guarantees
        # the file exists (or fails the job). The unsigned .msix is for Microsoft
        # Store (Partner Center) submission only and is NOT attached to the
        # GitHub Release (see release.yml) since unsigned packages can't sideload.
        if-no-files-found: warn

    - name: Upload macOS app
      if: matrix.name == 'macos'
      uses: actions/upload-artifact@v6
      with:
        name: macos-app${{ inputs.artifact_suffix }}
        path: build/dist/yanta-macos.tar.gz
        if-no-files-found: error

    - name: Upload macOS dmg
      if: matrix.name == 'macos'
      uses: actions/upload-artifact@v6
      with:
        name: macos-dmg${{ inputs.artifact_suffix }}
        path: build/dist/yanta-macos-*.dmg
        if-no-files-found: error
