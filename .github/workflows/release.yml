name: Release

on:
  push:
    tags: [ "v*" ]

jobs:
  build:
    uses: ./.github/workflows/build-release.yml
    with:
      version: ${{ github.ref_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts

    - name: List artifacts
      run: |
        echo "=== Downloaded artifacts ==="
        find artifacts -type f -exec ls -lh {} \;

    - name: Prepare release files
      run: |
        mkdir -p release
        # Exclude the unsigned MSIX: it is for Microsoft Store (Partner Center)
        # submission only, where the Store re-signs it. An unsigned .msix can't be
        # installed via direct download, so it must not be a GitHub Release asset.
        # It remains available as the `windows-msix` workflow artifact.
        find artifacts -type f ! -name '*.msix' -exec cp {} release/ \;
        echo "=== Release files ==="
        ls -lh release/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref_name, '-') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
